participant_id: sandbox
graph_name: brain_sandbox
session_description: Two-node brain-state simulation + decoding sandbox.

nodes:
  - name: brain_sim
    nickname: brain_sim
    module: ../brand-modules/brand-sandbox
    run_priority: 99
    parameters:
      log: INFO
      sync_key: sync
      time_key: ts
      output_stream: brain_state
      sample_rate: 100
      random_seed: 42
      max_len: 60000

  - name: state_decoder
    nickname: state_decoder
    module: ../brand-modules/brand-sandbox
    run_priority: 99
    parameters:
      log: INFO
      sync_key: sync
      time_key: ts
      input_stream: brain_state
      output_stream: decoded_state
      print_states: true
      max_len: 60000

derivatives:
  - nickname: saveBrainState
    name: saveBrainState.py
    module: ../brand-modules/brand-sandbox
    autorun_step: 1
    parameters: {}
